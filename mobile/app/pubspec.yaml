name: sesori_mobile
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
resolution: workspace

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.5+7

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.9
  http: ^1.6.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  collection: ^1.19.1
  rxdart: ^0.28.0
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1
  sesori_shared:
    path: ../../shared/sesori_shared
  sesori_auth:
    path: ../module_auth
  sesori_dart_core:
    path: ../module_core
  theme_zyra:
    path: ../module_zyra
  cryptography: ^2.9.0
  cryptography_flutter: ^2.3.4
  web_socket_channel: ^3.0.3
  # Pinned to 10.0.0 because 10.1.0 pulls in flutter_secure_storage_darwin 0.3.0,
  # which uses CryptoKit APIs (SymmetricKey, AES.GCM) that require iOS 13.0+ but
  # incorrectly guards them with an iOS 11.3 availability check. This causes Swift
  # compiler errors when archiving for iOS. See upstream issue #1119.
  flutter_secure_storage: 10.0.0
  app_links: ^7.0.0
  url_launcher: ^6.3.2
  universal_platform: ^1.1.0
  record: ^6.2.0
  path: any
  path_provider: ^2.1.5
  re_highlight: ^0.0.3
  wakelock_plus: ^1.5.1
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  flutter_svg: ^2.2.4
  cue: ^0.2.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  no_slop_linter:
    path: "../../shared/no_slop_linter"
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  injectable_generator: ^3.0.2
  bloc_test: ^10.0.0
  build_runner: any
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.7

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Enable Swift Package Manager for iOS builds
  config:
    enable-swift-package-manager: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/bkg_png/
    - assets/images/bkg_webp/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_native_splash:
  # This package generates native code to customize Flutter's default white native splash screen
  # with background color and splash image.
  # Steps to make this work:
  # 1. Customize the parameters below.
  # 2. run the following command in the terminal:
  # dart run flutter_native_splash:create
  # or if you place this not in pubspec.yaml and not in flutter_native_splash.yaml:
  # dart run flutter_native_splash:create -p ../your-filepath.yaml
  # 3. voila, done!

  # NOTES:
  # - in case you got some trouble, cleaning up flutter project might help:
  # flutter clean ; flutter pub get
  # - To restore Flutter's default white splash screen, run the following command in the terminal:
  # dart run flutter_native_splash:remove
  # or if you place this not in pubspec.yaml and not in flutter_native_splash.yaml:
  # dart run flutter_native_splash:remove -p ../your-filepath.yaml

  # IMPORTANT NOTE: These parameter do not affect the configuration of Android 12 and later, which
  # handle splash screens differently that prior versions of Android.  Android 12 and later must be
  # configured specifically in the android_12 section below, at the very end.

  #======================================================================
  # Shared (all platforms)
  fullscreen: true # default false
  #======================================================================
  # iOS
  background_image_ios: "assets/images/bkg_png/light_mode_portrait_splash.png"
  background_image_dark_ios: "assets/images/bkg_png/dark_mode_portrait_splash.png"
  ios_content_mode: center # center, scaleToFill, scaleAspectFit, scaleAspectFill
  #======================================================================
  # Android
  # On android 12+ bkg image is not supported, so we'll just use color (for all android versions)
  android: false
  color_android: "#ffffff"
  color_dark_android: "#000000"
  android_screen_orientation: sensorPortrait
  # above stuff won't affect Android 12+ at all
  android_12:
    # background color
    color: "#ffffff"
    color_dark: "#000000"
    # center-logo background color
    icon_background_color: "#FFFFFF"
    # icon_background_color_dark: "#eeeeee"
    # center-logo
    # If this parameter is not specified, the app's launcher icon will be used instead.
    # Please note that the splash screen will be clipped to a circle on the center of the screen.
    # with background: 960×960 px (fit within circle 640px in diameter)
    # without background: 1152×1152 px (fit within circle 768px in diameter)
    # ensure that the most important design elements of your image are placed within a circular area
    # image: assets/images/logo/blank.png
    # image_dark: assets/images/logo/logo-splash2.png

  #======================================================================
  # Web
  background_image_web: "assets/images/bkg_png/light_mode_portrait_splash.png"
  background_image_dark_web: "assets/images/bkg_png/dark_mode_portrait_splash.png"
  web_image_mode: cover # center, contain, stretch, cover


  # general image for all platform (except android 12+):
  # allows you to specify an image used in the splash screen. It must be a
  # png file and should be sized for 4x pixel density.
  # image: assets/images/bkg_png/splash.png
  #image_dark:          assets/splash-invert.png
  # platform-specific image. will override general image if active:
  #image_android:       assets/splash-android.png
  #image_dark_android:  assets/splash-invert-android.png
  #image_ios:           assets/splash-ios.png
  #image_dark_ios:      assets/splash-invert-ios.png
  #image_web:           assets/splash-web.gif
  #image_dark_web:      assets/splash-invert-web.gif

  #========================================================================

  # handling concept. visit https://developer.android.com/guide/topics/ui/splash-screen

  #! ANDROID 12+ configuration:
