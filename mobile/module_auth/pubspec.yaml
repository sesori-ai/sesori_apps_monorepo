name: sesori_auth
description: Authentication package for Sesori — token lifecycle, OAuth flow, authenticated HTTP client.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.5

dependencies:
  cryptography: ^2.8.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  http: ^1.6.0
  injectable: ^3.0.0
  json_annotation: ^4.11.0
  meta: ^1.16.0
  rxdart: ^0.28.0
  sesori_shared:
    path: ../../shared/sesori_shared

dev_dependencies:
  build_runner: any
  no_slop_linter:
    path: "../../shared/no_slop_linter"
  fake_async: ^1.3.3
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  json_serializable: ^6.13.0
  mocktail: ^1.0.4
  test: ^1.25.0
