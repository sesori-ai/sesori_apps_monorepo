  meta: ^1.16.0
  rxdart: ^0.28.0
  sesori_shared: ^0.3.0

dev_dependencies:
  build_runner: any
  fake_async: ^1.3.3
  freezed: ^3.2.5
  injectable_generator: ^2.12.1
  json_serializable: ^6.13.0
  mocktail: ^1.0.4
  test: ^1.25.0
