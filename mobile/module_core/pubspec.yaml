name: sesori_dart_core
description: Core business logic for Sesori — pure Dart, no Flutter dependency.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.1

dependencies:
  bloc: ^9.0.0
  collection: ^1.19.1
  cryptography: ^2.8.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  http: ^1.6.0
  injectable: ^2.7.1
  intl: any
  json_annotation: ^4.11.0
  meta: ^1.16.0
  rxdart: ^0.28.0
  sesori_auth:
    path: ../module_auth
  sesori_shared:
    path: ../../shared/sesori_shared
  web_socket_channel: ^3.0.1

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: any
  freezed: ^3.2.5
  injectable_generator: ^2.12.1
  json_serializable: ^6.13.0
  mocktail: ^1.0.4
  test: ^1.25.0
  fake_async: ^1.3.3

