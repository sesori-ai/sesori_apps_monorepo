name: sesori_desktop_core
description: Desktop business logic for Sesori — bridge supervision, control-channel orchestration, desktop cubits. Pure Dart, no Flutter dependency.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.2

dependencies:
  bloc: ^9.2.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  sesori_dart_core:
    path: ../module_core
  sesori_shared:
    path: ../../shared/sesori_shared

dev_dependencies:
  no_slop_linter:
    path: "../../shared/no_slop_linter"
  build_runner: any
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  mocktail: ^1.0.5
  rxdart: ^0.28.0
  test: ^1.31.0
