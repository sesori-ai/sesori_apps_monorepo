name: Bridge Release

on:
  push:
    tags: ["bridge-v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no publish)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.runner }}
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target_os: macos
            target_arch: arm64
            asset_name: sesori-bridge-macos-arm64
            archive_ext: tar.gz
          - runner: macos-26-intel
            target_os: macos
            target_arch: x64
            asset_name: sesori-bridge-macos-x64
            archive_ext: tar.gz
          - runner: ubuntu-latest
            target_os: linux
            target_arch: x64
            asset_name: sesori-bridge-linux-x64
            archive_ext: tar.gz
          - runner: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
            asset_name: sesori-bridge-linux-arm64
            archive_ext: tar.gz
          - runner: windows-latest
            target_os: windows
            target_arch: x64
            asset_name: sesori-bridge-windows-x64
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.pub-cache
          key: ${{ runner.os }}-${{ runner.arch }}-pub-${{ hashFiles('bridge/pubspec.lock') }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == bridge-v* ]]; then
            VERSION="${GITHUB_REF_NAME#bridge-v}"
          else
            VERSION=$(grep '^version:' bridge/app/pubspec.yaml | awk '{print $2}')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Get dependencies
        run: dart pub get
        working-directory: bridge

      - name: Bump version
        if: startsWith(github.ref_name, 'bridge-v')
        shell: bash
        run: |
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [[ "$CURRENT_VERSION" == "${{ steps.version.outputs.VERSION }}" ]]; then
            echo "Version already set to $CURRENT_VERSION; skipping bump."
            exit 0
          fi

          dart run tool/bump_version.dart ${{ steps.version.outputs.VERSION }}
        working-directory: bridge/app

      - name: Build binary
        run: dart build cli -o build/cli
        working-directory: bridge/app

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: mv build/cli/bundle/bin/bridge build/cli/bundle/bin/sesori-bridge
        working-directory: bridge/app

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item -Path "bridge/app/build/cli/bundle/bin/bridge.exe" -NewName "sesori-bridge.exe"

      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo -n "$MACOS_CERT_P12_BASE64" | base64 --decode -o certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 1200 build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -s build.keychain login.keychain
          security default-keychain -s build.keychain
          rm -f certificate.p12
        working-directory: bridge/app

      - name: Verify signing prerequisites
        if: runner.os == 'macOS'
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "Error: APPLE_TEAM_ID repository variable is not set." >&2
            echo "Set it in Settings > Secrets and variables > Variables." >&2
            exit 1
          fi
        working-directory: bridge/app

      - name: Sign binary
        if: runner.os == 'macOS'
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          codesign -s "Developer ID Application: DigitalBlock Labs LTD ($APPLE_TEAM_ID)" \
            --options runtime \
            --timestamp \
            --force \
            --verbose \
            build/cli/bundle/bin/sesori-bridge
          codesign -dv --verbose=4 build/cli/bundle/bin/sesori-bridge
        working-directory: bridge/app

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf ${{ matrix.asset_name }}.tar.gz -C build/cli/bundle .
        working-directory: bridge/app

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "bridge/app/build/cli/bundle/*" -DestinationPath "bridge/app/${{ matrix.asset_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: bridge/app/${{ matrix.asset_name }}.${{ matrix.archive_ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.dry_run != 'true' && startsWith(github.ref_name, 'bridge-v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        working-directory: artifacts
        run: |
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | sort -z | while IFS= read -r -d '' file; do
            sha256sum "$file" | awk -v name="$(basename "$file")" '{print $1 "  " name}'
          done > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bridge ${{ github.ref_name }}
          make_latest: "true"
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/checksums.txt

  publish-platform:
    name: Publish platform npm packages
    needs: release
    runs-on: ubuntu-latest
    if: github.event.inputs.dry_run != 'true' && startsWith(github.ref_name, 'bridge-v')
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#bridge-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir artifacts --pattern "*.tar.gz" --pattern "*.zip" --pattern "checksums.txt"

      - name: Verify release archive checksums
        shell: bash
        run: |
          checksum_for() {
            local archive_name="$1"
            awk -v name="$archive_name" '$2 == name || $2 == "*" name { print $1; exit }' artifacts/checksums.txt
          }

          verify_archive_checksum() {
            local archive_path="$1"
            local archive_name
            local expected_checksum
            local actual_checksum

            archive_name="$(basename "$archive_path")"
            expected_checksum="$(checksum_for "$archive_name")"

            if [[ -z "$expected_checksum" ]]; then
              echo "Missing checksum entry for $archive_name in release contract." >&2
              exit 1
            fi

            actual_checksum="$(sha256sum "$archive_path" | awk '{print $1}')"

            if [[ "$actual_checksum" != "$expected_checksum" ]]; then
              echo "Checksum mismatch for $archive_name." >&2
              echo "Expected: $expected_checksum" >&2
              echo "Actual:   $actual_checksum" >&2
              exit 1
            fi
          }

          verify_archive_checksum artifacts/sesori-bridge-macos-arm64.tar.gz
          verify_archive_checksum artifacts/sesori-bridge-macos-x64.tar.gz
          verify_archive_checksum artifacts/sesori-bridge-linux-x64.tar.gz
          verify_archive_checksum artifacts/sesori-bridge-linux-arm64.tar.gz
          verify_archive_checksum artifacts/sesori-bridge-windows-x64.zip

      - name: Extract archives and copy runtime bundles
        shell: bash
        run: |
          mkdir -p /tmp/bridges/macos-arm64 /tmp/bridges/macos-x64 \
                   /tmp/bridges/linux-x64 /tmp/bridges/linux-arm64 \
                   /tmp/bridges/windows-x64

          copy_runtime_bundle() {
            local source_root="$1"
            local package_root="$2"
            local package_name="$3"
            local asset_name="$4"

            rm -rf "$package_root/lib/runtime"
            mkdir -p "$package_root/lib/runtime"
            cp -R "$source_root/bin" "$package_root/lib/runtime/bin"
            cp -R "$source_root/lib" "$package_root/lib/runtime/lib"

            node -e '
              const fs = require("fs");
              const [packageJsonPath, releaseTag, version, assetName, packageName] = process.argv.slice(1);
              const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
              const metadata = packageJson.sesoriBridge;
              if (!metadata) {
                throw new Error("Missing sesoriBridge metadata in " + packageJsonPath);
              }
              if (packageJson.version !== version) {
                throw new Error("Package version drift in " + packageJsonPath + ": expected " + version + ", got " + packageJson.version);
              }
              if (packageJson.name !== packageName) {
                throw new Error("Package name drift in " + packageJsonPath + ": expected " + packageName + ", got " + packageJson.name);
              }
              if (metadata.bootstrapOnly !== true) {
                throw new Error("bootstrapOnly must stay true in " + packageJsonPath);
              }
              if (metadata.runtimeBundlePath !== "lib/runtime") {
                throw new Error("runtimeBundlePath drift in " + packageJsonPath);
              }
              if (metadata.releaseArtifact !== assetName) {
                throw new Error("releaseArtifact drift in " + packageJsonPath + ": expected " + assetName + ", got " + metadata.releaseArtifact);
              }
              if (metadata.releaseTag !== releaseTag) {
                throw new Error("releaseTag drift in " + packageJsonPath + ": expected " + releaseTag + ", got " + metadata.releaseTag);
              }
              const provenancePath = packageJsonPath.replace(/package\.json$/, "lib/runtime/.bridge-release-provenance.json");
              fs.writeFileSync(
                provenancePath,
                JSON.stringify({
                  packageName,
                  version,
                  releaseTag,
                  releaseArtifact: assetName,
                  runtimeBundlePath: metadata.runtimeBundlePath,
                  bootstrapOnly: metadata.bootstrapOnly,
                }, null, 2) + "\n"
              );
            ' "$package_root/package.json" "$RELEASE_TAG" "${{ steps.version.outputs.VERSION }}" "$asset_name" "$package_name"

            diff -r "$source_root/bin" "$package_root/lib/runtime/bin"
            diff -r "$source_root/lib" "$package_root/lib/runtime/lib"
          }

          tar -xzf artifacts/sesori-bridge-macos-arm64.tar.gz \
              -C /tmp/bridges/macos-arm64
          copy_runtime_bundle \
            /tmp/bridges/macos-arm64 \
            bridge/app/npm/sesori-bridge-darwin-arm64 \
            @sesori/bridge-darwin-arm64 \
            sesori-bridge-macos-arm64.tar.gz
          chmod +x bridge/app/npm/sesori-bridge-darwin-arm64/lib/runtime/bin/sesori-bridge

          tar -xzf artifacts/sesori-bridge-macos-x64.tar.gz \
              -C /tmp/bridges/macos-x64
          copy_runtime_bundle \
            /tmp/bridges/macos-x64 \
            bridge/app/npm/sesori-bridge-darwin-x64 \
            @sesori/bridge-darwin-x64 \
            sesori-bridge-macos-x64.tar.gz
          chmod +x bridge/app/npm/sesori-bridge-darwin-x64/lib/runtime/bin/sesori-bridge

          tar -xzf artifacts/sesori-bridge-linux-x64.tar.gz \
              -C /tmp/bridges/linux-x64
          copy_runtime_bundle \
            /tmp/bridges/linux-x64 \
            bridge/app/npm/sesori-bridge-linux-x64 \
            @sesori/bridge-linux-x64 \
            sesori-bridge-linux-x64.tar.gz
          chmod +x bridge/app/npm/sesori-bridge-linux-x64/lib/runtime/bin/sesori-bridge

          tar -xzf artifacts/sesori-bridge-linux-arm64.tar.gz \
              -C /tmp/bridges/linux-arm64
          copy_runtime_bundle \
            /tmp/bridges/linux-arm64 \
            bridge/app/npm/sesori-bridge-linux-arm64 \
            @sesori/bridge-linux-arm64 \
            sesori-bridge-linux-arm64.tar.gz
          chmod +x bridge/app/npm/sesori-bridge-linux-arm64/lib/runtime/bin/sesori-bridge

          unzip artifacts/sesori-bridge-windows-x64.zip \
                -d /tmp/bridges/windows-x64
          copy_runtime_bundle \
            /tmp/bridges/windows-x64 \
            bridge/app/npm/sesori-bridge-win32-x64 \
            @sesori/bridge-win32-x64 \
            sesori-bridge-windows-x64.zip

      - name: Publish platform packages
        shell: bash
        working-directory: bridge/app/npm
        run: |
          for pkg in sesori-bridge-darwin-arm64 sesori-bridge-darwin-x64 \
                     sesori-bridge-linux-x64 sesori-bridge-linux-arm64 \
                     sesori-bridge-win32-x64; do
            echo "Publishing $pkg..."
            (cd "$pkg" && npm publish --access public)
          done

  publish-wrapper:
    name: Publish wrapper npm package
    needs: publish-platform
    runs-on: ubuntu-latest
    if: github.event.inputs.dry_run != 'true' && startsWith(github.ref_name, 'bridge-v')
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#bridge-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate wrapper package metadata
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const [packageJsonPath, releaseTag, version] = process.argv.slice(1);
            const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
            const metadata = packageJson.sesoriBridge;
            if (!metadata) {
              throw new Error("Missing sesoriBridge metadata in " + packageJsonPath);
            }
            if (packageJson.version !== version) {
              throw new Error("Package version drift in " + packageJsonPath + ": expected " + version + ", got " + packageJson.version);
            }
            if (packageJson.name !== "@sesori/bridge") {
              throw new Error("Package name drift in " + packageJsonPath + ": expected @sesori/bridge, got " + packageJson.name);
            }
            if (metadata.bootstrapOnly !== true) {
              throw new Error("bootstrapOnly must stay true in " + packageJsonPath);
            }
            if (metadata.managedRuntimeOwner !== false) {
              throw new Error("managedRuntimeOwner must stay false in " + packageJsonPath);
            }
            if (metadata.runtimeBundleSource !== "github-release-assets") {
              throw new Error("runtimeBundleSource drift in " + packageJsonPath + ": expected github-release-assets, got " + metadata.runtimeBundleSource);
            }
            if (metadata.releaseTag !== releaseTag) {
              throw new Error("releaseTag drift in " + packageJsonPath + ": expected " + releaseTag + ", got " + metadata.releaseTag);
            }
          ' bridge/app/npm/sesori-bridge/package.json "$RELEASE_TAG" "${{ steps.version.outputs.VERSION }}"

      - name: Publish wrapper package
        run: npm publish --access public
        working-directory: bridge/app/npm/sesori-bridge
