name: Release All Platforms

# NOTE: Temporarily repurposed to test the iOS build path before wiring up
# TestFlight uploads. Builds the iOS app via the chosen fastlane lane and
# uploads the IPA as a workflow artifact — no App Store / TestFlight upload.
# Android deploy is disabled below; restore it once the iOS build is validated.

on:
  workflow_dispatch:
    inputs:
      ios_runner:
        description: 'macOS runner for iOS build'
        required: false
        type: choice
        options:
          - macos-latest
        default: 'macos-latest'
      # deploy_android:
      #   description: 'Deploy to Android Internal Track'
      #   required: false
      #   type: boolean
      #   default: true

concurrency:
  group: release-all-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios-next-build-number:
    name: Resolve next iOS build number
    uses: ./.github/workflows/_reusable-ios-next-build-number.yml
    secrets:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}

  ios:
    name: Build iOS app
    if: false
    needs: ios-next-build-number
    uses: ./.github/workflows/_reusable-ios-testflight.yml
    with:
      runner: ${{ inputs.ios_runner }}
      build_number: ${{ needs.ios-next-build-number.outputs.build_number }}
    secrets:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}

  # Android Internal Track deployment — disabled while iOS build path is being validated.
  # Re-enable by uncommenting this job, the input above, and the summary block below.
  #
  # android:
  #   if: ${{ inputs.deploy_android }}
  #   uses: ./.github/workflows/_reusable-android-internal.yml
  #   secrets:
  #     GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
  #     ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  #     ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  #     ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  #     ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

  summary:
    name: Release Summary
    runs-on: ubuntu-latest #blacksmith-2vcpu-ubuntu-2404
    needs: [ios-next-build-number, ios]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Platform Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.ios-next-build-number.result }}" == "success" ]; then
            echo "- **iOS build number**: ${{ needs.ios-next-build-number.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **iOS build number**: ${{ needs.ios-next-build-number.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.ios.result }}" == "success" ]; then
            echo "- **iOS (artifact)**: Built" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.ios.result }}" == "failure" ]; then
            echo "- **iOS (artifact)**: Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **iOS (artifact)**: ${{ needs.ios.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- **Android Internal**: Disabled" >> $GITHUB_STEP_SUMMARY
