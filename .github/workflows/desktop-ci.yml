name: Desktop CI

# Desktop PR CI (docs/desktop/phase-2-desktop-shell.md, PR 2.1).
#
# Deliberately NO workflow-level `paths:` filter: this workflow is meant to be
# a required check, and GitHub leaves a skipped-required workflow "pending"
# forever — blocking every non-desktop PR. Instead the `changes` job computes
# changed-path outputs, the desktop jobs run behind `if:` guards on those
# outputs, and the terminal `status` job aggregates the results. Mark ONLY
# `status` as the required check.
#
# Non-blocking for CLI/mobile releases (release-safety invariant #3): this is
# PR CI only — the release pipeline does not gate on any job here.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: desktop-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # dorny/paths-filter reads the PR's changed files via the REST API.
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
      flutter-version: ${{ steps.flutter-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      # Read once here and share via job output so the analyze/build jobs
      # can't silently diverge on version-parsing logic.
      - name: Read Flutter version from .tool-versions
        id: flutter-version
        shell: bash
        run: |
          FLUTTER_VERSION=$(awk '$1 == "flutter" { print $2 }' .tool-versions | sed 's/-stable$//')
          if [ -z "$FLUTTER_VERSION" ]; then
            echo "Unable to find a Flutter version in .tool-versions" >&2
            exit 1
          fi
          echo "version=$FLUTTER_VERSION" >> "$GITHUB_OUTPUT"

      # The desktop-relevant set: the two desktop packages, the shared client
      # packages the desktop build consumes (a shared change can break the
      # desktop build while mobile CI stays green), the client workspace root
      # files, and this CI's own inputs — the workflow itself, the toolchain
      # pin, the analyzer plugin, and the lint-rule file included by
      # client/analysis_options.yaml — so a workflow/toolchain/linter change
      # can never merge with the desktop jobs skipped.
      #
      # Scope boundary: when a shared package opens the gate, this workflow
      # runs the desktop packages' analyze/test/build only — it deliberately
      # does NOT run the shared package's own package-local tests (that is
      # mobile/client CI's responsibility).
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            desktop:
              - 'client/desktop/**'
              - 'client/module_desktop_core/**'
              - 'client/module_core/**'
              - 'client/module_auth/**'
              - 'client/module_prego/**'
              - 'shared/sesori_shared/**'
              - 'shared/no_slop_linter/**'
              - 'client/pubspec.yaml'
              - 'client/pubspec.lock'
              - 'client/analysis_options.yaml'
              - 'client/Makefile'
              - 'client/app/all_lint_rules.yaml'
              - '.github/workflows/desktop-ci.yml'
              - '.tool-versions'

  analyze-test:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.changes.outputs.flutter-version }}
          channel: stable
          cache: true

      - name: Get dependencies (workspace)
        run: dart pub get
        working-directory: client

      - name: Analyze module_desktop_core
        run: dart analyze --fatal-infos
        working-directory: client/module_desktop_core

      - name: Analyze client/desktop
        run: dart analyze --fatal-infos
        working-directory: client/desktop

      - name: Run tests for module_desktop_core
        run: dart test
        working-directory: client/module_desktop_core

      - name: Run tests for client/desktop
        run: flutter test
        working-directory: client/desktop

  build:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.changes.outputs.flutter-version }}
          channel: stable
          cache: true

      - name: Install Linux desktop build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies (workspace)
        run: dart pub get
        working-directory: client

      - name: Build ${{ matrix.target }}
        run: flutter build ${{ matrix.target }}
        working-directory: client/desktop

  # Terminal aggregator — the ONLY job to mark as a required branch-protection
  # check. It inspects its `needs` results and fails on any failure/cancelled
  # (skipped dependents don't propagate failure, so a naive always-green
  # status job would report success after a matrix failure). It succeeds when
  # every desktop job passed or was skipped by the path gate.
  status:
    needs: [changes, analyze-test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail on failed or cancelled desktop jobs
        shell: bash
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS"
          bad=$(echo "$RESULTS" | jq -r '[.[] | select(.result == "failure" or .result == "cancelled")] | length')
          if [ "$bad" -gt 0 ]; then
            echo "One or more desktop jobs failed or were cancelled." >&2
            exit 1
          fi
          echo "All desktop jobs passed or were skipped by the path gate."
