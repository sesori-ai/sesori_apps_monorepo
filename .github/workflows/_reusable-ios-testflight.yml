name: iOS TestFlight Deploy

on:
  workflow_call:
    inputs:
      runner:
        description: 'macOS runner to use for the build'
        required: false
        type: string
        default: 'macos-latest'
      build_number:
        description: 'Pre-computed TestFlight build number. When empty, the lane queries ASC itself.'
        required: false
        type: string
        default: ''
    secrets:
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_CONTENT:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: true
      MATCH_GIT_URL:
        required: true
      APPLE_TEAM_ID:
        required: true
      ITC_TEAM_ID:
        required: false

# Xcode and CocoaPods versions — update these when upgrading
env:
  XCODE_VERSION: '26.3.0'
  COCOAPODS_VERSION: '1.16.2'

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
      BUILD_NUMBER: ${{ inputs.build_number }}
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install specific CocoaPods version
        run: |
          gem install cocoapods -v ${{ env.COCOAPODS_VERSION }}
          pod --version

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          include-submodules: 'false'

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: mobile/app/ios/Pods
          key: ${{ runner.os }}-pods-${{ env.COCOAPODS_VERSION }}-${{ hashFiles('mobile/app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-${{ env.COCOAPODS_VERSION }}-

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: mobile/app/ios

      - name: Generate iOS build config
        run: flutter build ios --config-only --release --no-codesign
        working-directory: mobile/app

      - name: Deploy to TestFlight
        run: bundle exec fastlane deploy_testflight
        working-directory: mobile/app/ios

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ github.run_id }}
          path: |
            mobile/app/ios/build/Logs/
            ~/Library/Logs/DiagnosticReports/
          retention-days: 7

      - name: Summary
        if: success()
        run: |
          source mobile/app/ios/build_info.env
          echo "## iOS TestFlight Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION} (${BUILD_NUMBER})" >> $GITHUB_STEP_SUMMARY
          echo "- **Xcode**: ${{ env.XCODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CocoaPods**: ${{ env.COCOAPODS_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      # Tag the commit with the build number so the manual `submit-release.yml`
      # workflow can later map a TestFlight build back to its originating
      # commit. Using an annotated tag (-a) keeps the build metadata in git
      # for inspection via `git show ios-build-<N>`. Tag is idempotent at the
      # remote level: a re-run of the same commit's build is rejected by the
      # remote when the tag already exists, which is the desired fail-loud.
      - name: Tag commit with TestFlight build number
        if: success()
        run: |
          set -euo pipefail
          source mobile/app/ios/build_info.env
          TAG="ios-build-${BUILD_NUMBER}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally — skipping"
            exit 0
          fi
          git tag -a "$TAG" -m "iOS TestFlight build ${BUILD_NUMBER} (v${VERSION}) sha=${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"
          echo "- **Tag**: \`${TAG}\`" >> $GITHUB_STEP_SUMMARY
