name: Bridge CI

on:
  push:
    branches: [main]
    paths:
      - 'bridge/**'
      - 'shared/**'
  pull_request:
    paths:
      - 'bridge/**'
      - 'shared/**'

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1

      - uses: actions/cache@v5
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-${{ runner.arch }}-pub-${{ hashFiles('bridge/pubspec.lock') }}

      - name: Get dependencies (workspace)
        run: dart pub get
        working-directory: bridge

      - name: Analyze bridge/app
        run: dart analyze
        working-directory: bridge/app

      - name: Analyze sesori_plugin_interface
        run: dart analyze
        working-directory: bridge/sesori_plugin_interface

      - name: Analyze sesori_plugin_opencode
        run: dart analyze
        working-directory: bridge/sesori_plugin_opencode

      - name: Run tests for bridge/app
        run: dart test
        working-directory: bridge/app

      - name: Run tests for sesori_plugin_opencode
        run: dart test
        working-directory: bridge/sesori_plugin_opencode

  build-smoke:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      PUB_CACHE: ${{ github.workspace }}/.pub-cache
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1

      - uses: actions/cache@v5
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-${{ runner.arch }}-pub-${{ hashFiles('bridge/pubspec.lock') }}

      - name: Get dependencies (workspace)
        run: dart pub get
        working-directory: bridge

      - name: Compile smoke test
        shell: bash
        working-directory: bridge/app
        run: dart build cli -o build
