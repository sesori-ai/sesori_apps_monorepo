name: iOS Next Build Number

# Lightweight Linux job that asks App Store Connect for the highest existing
# build number and outputs (max + 1). Runs ahead of the macOS TestFlight job
# so the expensive runner doesn't burn time on a pure HTTP lookup.

on:
  workflow_call:
    secrets:
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_CONTENT:
        required: true
    outputs:
      build_number:
        description: 'Next TestFlight build number to use for the upcoming build'
        value: ${{ jobs.compute.outputs.build_number }}

# Keep this loosely in sync with the fastlane version used by the iOS build
# Gemfile (mobile/app/ios/Gemfile). Spaceship is bundled with fastlane.
env:
  FASTLANE_VERSION: '~> 2.232'

jobs:
  compute:
    name: Compute Next TestFlight Build Number
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      build_number: ${{ steps.compute.outputs.build_number }}

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install fastlane
        run: gem install fastlane -v "${{ env.FASTLANE_VERSION }}" --no-document

      - name: Compute next build number
        id: compute
        working-directory: mobile/app/ios
        run: |
          set -euo pipefail
          output=$(fastlane next_build_number 2>&1)
          echo "$output"
          build_number=$(printf '%s\n' "$output" | grep -oE 'NEXT_BUILD_NUMBER=[0-9]+' | tail -n1 | cut -d= -f2)
          if [ -z "${build_number:-}" ]; then
            echo "::error::Failed to parse NEXT_BUILD_NUMBER from fastlane output"
            exit 1
          fi
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "Resolved next build number: ${build_number}"

      - name: Summary
        if: success()
        run: |
          echo "## iOS Next Build Number" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next build number**: ${{ steps.compute.outputs.build_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
