name: Mobile CI

on:
  push:
    branches: [main]
    # Scoped to the mobile PRODUCT paths (not blanket client/**) so future
    # client/desktop PRs never trigger mobile CI — release-safety invariant #3.
    paths:
      - 'client/app/**'
      - 'client/module_core/**'
      - 'client/module_auth/**'
      - 'client/module_prego/**'
      - 'client/pubspec.yaml'
      - 'client/pubspec.lock'
      - 'client/analysis_options.yaml'
      - 'client/Makefile'
      - 'shared/**'
  pull_request:
    paths:
      - 'client/app/**'
      - 'client/module_core/**'
      - 'client/module_auth/**'
      - 'client/module_prego/**'
      - 'client/pubspec.yaml'
      - 'client/pubspec.lock'
      - 'client/analysis_options.yaml'
      - 'client/Makefile'
      - 'shared/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read Flutter version from .tool-versions
        shell: bash
        run: |
          FLUTTER_VERSION=$(awk '$1 == "flutter" { print $2 }' .tool-versions | sed 's/-stable$//')
          if [ -z "$FLUTTER_VERSION" ]; then
            echo "Unable to find a Flutter version in .tool-versions" >&2
            exit 1
          fi
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> "$GITHUB_ENV"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies (workspace)
        run: dart pub get
        working-directory: client

      - name: Analyze client/app
        run: dart analyze --fatal-infos
        working-directory: client/app

      - name: Analyze module_core
        run: dart analyze --fatal-infos
        working-directory: client/module_core

      - name: Analyze module_auth
        run: dart analyze --fatal-infos
        working-directory: client/module_auth

      - name: Run tests for module_core
        run: dart test
        working-directory: client/module_core

      - name: Run tests for module_auth
        run: dart test
        working-directory: client/module_auth

      - name: Run tests for client/app
        run: flutter test
        working-directory: client/app

      - name: Get dependencies (no_slop_linter)
        run: dart pub get
        working-directory: shared/no_slop_linter

      - name: Run tests for no_slop_linter
        run: dart test
        working-directory: shared/no_slop_linter
