name: Android Internal Deploy

on:
  workflow_call:
    inputs:
      build_number:
        description: 'Pre-computed aligned build number / version code'
        required: true
        type: string
    secrets:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: true
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_PROPERTIES:
        required: true

jobs:
  deploy:
    name: Build and Deploy to Internal Track
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45

    env:
      CI: true
      VERSION_CODE: ${{ inputs.build_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read Flutter version from .tool-versions
        shell: bash
        run: |
          FLUTTER_VERSION=$(awk '$1 == "flutter" { print $2 }' .tool-versions | sed 's/-stable$//')
          if [ -z "$FLUTTER_VERSION" ]; then
            echo "Unable to find a Flutter version in .tool-versions" >&2
            exit 1
          fi
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies (workspace)
        run: dart pub get
        working-directory: mobile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: mobile/app/android

      - name: Build and Deploy to Internal Track
        working-directory: mobile/app/android
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_PROPERTIES: ${{ secrets.ANDROID_PROPERTIES }}
        run: bundle exec fastlane deploy_internal

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f mobile/app/android/fastlane/service-account.json
          rm -f mobile/app/android/keystore/release.keystore
          rm -f mobile/app/android/release.properties

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs-${{ github.run_id }}
          path: |
            mobile/app/android/app/build/reports/
            mobile/app/build/app/outputs/logs/
          retention-days: 7

      - name: Summary
        if: success()
        run: |
          source mobile/app/android/build_info.env
          echo "## Android Internal Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION} (${VERSION_CODE})" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
