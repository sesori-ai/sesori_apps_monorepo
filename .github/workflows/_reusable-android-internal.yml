name: Android Internal Deploy

on:
  workflow_call:
    inputs:
      runner:
        description: 'Linux runner to use for the build'
        required: false
        type: string
        default: 'ubuntu-latest'
      build_number:
        description: 'Pre-computed aligned build number / version code'
        required: true
        type: string
    secrets:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: true
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_PROPERTIES:
        required: true

jobs:
  deploy:
    name: Build and Deploy to Internal Track
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30

    env:
      VERSION_CODE: ${{ inputs.build_number }}
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          include-submodules: 'false'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: mobile/app/android

      - name: Build and Deploy to Internal Track
        working-directory: mobile/app/android
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_PROPERTIES: ${{ secrets.ANDROID_PROPERTIES }}
        run: bundle exec fastlane deploy_internal

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f mobile/app/android/fastlane/service-account.json
          rm -f mobile/app/android/keystore/release.keystore
          rm -f mobile/app/android/release.properties

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs-${{ github.run_id }}
          path: |
            mobile/app/android/app/build/reports/
            mobile/app/build/app/outputs/logs/
          retention-days: 7

      - name: Summary
        if: success()
        run: |
          source mobile/app/android/build_info.env
          echo "## Android Internal Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION} (${VERSION_CODE})" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      # Tag the commit with the version code so the manual `submit-release.yml`
      # workflow can later map a Play Store internal-track build back to its
      # originating commit. See the iOS reusable workflow for the rationale.
      - name: Tag commit with Play Store version code
        if: success()
        run: |
          set -euo pipefail
          source mobile/app/android/build_info.env
          TAG="android-build-${VERSION_CODE}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally — skipping"
            exit 0
          fi
          git tag -a "$TAG" -m "Android internal track build ${VERSION_CODE} (v${VERSION}) sha=${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"
          echo "- **Tag**: \`${TAG}\`" >> $GITHUB_STEP_SUMMARY
