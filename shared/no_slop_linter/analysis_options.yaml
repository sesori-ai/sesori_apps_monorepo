include: package:lints/recommended.yaml

analyzer:
  errors:
    non_constant_identifier_names: ignore
  exclude:
    [
      build/**,
      docs/**,
      scripts/**,
      "**.freezed.dart",
      "**.config.dart",
      "**.g.dart",
      "**.g.edited.dart",
      "lib/generated/**",
    ]

linter:
  rules:
    # prefer_single_quotes: true
    unintended_html_in_doc_comment: false

formatter:
  page_width: 120
  trailing_commas: preserve
