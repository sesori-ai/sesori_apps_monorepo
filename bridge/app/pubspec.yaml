version: 0.3.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  args: ^2.6.0
  cryptography: ^2.7.0
  web_socket_channel: ^3.0.0
  http: ^1.3.0
