name: sesori_bridge
description: Dart implementation of the Sesori Bridge CLI for WebSocket communication.
version: 1.1.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.2

dependencies:
  args: ^2.7.0
  cryptography: ^2.9.0
  web_socket_channel: ^3.0.3
  http: ^1.6.0
  crypto: ^3.0.7
  path: ^1.9.1
  sesori_shared:
    path: ../../shared/sesori_shared
  clock: ^1.1.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  rxdart: ^0.28.0
  sesori_plugin_interface:
    path: ../sesori_plugin_interface
  sesori_plugin_runtime:
    path: ../sesori_plugin_runtime
  opencode_plugin:
    path: ../sesori_plugin_opencode
  meta: ^1.18.3
  drift: ^2.34.0
  collection: ^1.19.1
  win32: ^6.3.0

dev_dependencies:
  test: ^1.31.1
  lints: ^6.1.0
  fake_async: ^1.3.3
  # Tests exercise raw sqlite3 directly (drift migrations, DAO tests);
  # production code reaches sqlite3 only transitively through drift.
  sqlite3: ^3.3.3
  build_runner: any
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  drift_dev: ^2.34.0
