name: sesori_bridge
description: Dart implementation of the Sesori Bridge CLI for WebSocket communication.
version: 0.2.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  args: ^2.6.0
  cryptography: ^2.7.0
  web_socket_channel: ^3.0.0
  http: ^1.3.0
  crypto: ^3.0.0
  path: ^1.9.0
  sesori_shared: ^0.3.0
  clock: ^1.1.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  sesori_plugin_interface:
    path: ../sesori_plugin_interface
  opencode_plugin:
    path: ../opencode_plugin

dev_dependencies:
  test: ^1.25.0
  lints: ^6.1.0
  fake_async: ^1.3.3
  build_runner: any
  freezed: ^3.2.5
  json_serializable: ^6.13.0

