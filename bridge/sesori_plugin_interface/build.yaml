targets:
  $default:
    builders:
      json_serializable:
        options:
          any_map: true
          explicit_to_json: true
          # Omit null-valued keys from wire payloads by default, so nullable
          # fields don't need an explicit @JsonKey(includeIfNull: false).
          include_if_null: false
      freezed:
        options:
          format: false
          map: false
          when: false
          from_json: false
          to_json: true
